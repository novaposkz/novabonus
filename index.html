<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт находится в разработке</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', Arial, sans-serif;
      color: #fff;
      position: relative;
    }
    .container {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 48px 32px 32px 32px;
      text-align: center;
      max-width: 400px;
      margin: 32px 0;
    }
    .container img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      border: 4px solid #fff;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(30,60,114,0.2);
    }
    p {
      font-size: 1.1rem;
      color: #e0e7ef;
      margin-bottom: 0;
    }
    .footer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      text-align: center;
      padding: 18px 0 12px 0;
      background: linear-gradient(90deg, rgba(30,60,114,0.7) 0%, rgba(42,82,152,0.7) 100%);
      font-size: 1rem;
      color: #fff;
      letter-spacing: 0.5px;
      font-weight: 400;
      box-shadow: 0 -2px 12px rgba(30,60,114,0.08);
    }
    .topbar {
      position: fixed;
      top: 0;
      right: 0;
      width: 100vw;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 24px 32px 0 0;
      z-index: 10;
      pointer-events: none;
    }
    .login-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, #ffb347 0%, #ffcc33 100%);
      color: #1e3c72;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 24px;
      padding: 10px 22px 10px 18px;
      box-shadow: 0 2px 8px rgba(255,179,71,0.15);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
      text-decoration: none;
      outline: none;
      pointer-events: auto;
    }
    .login-btn:hover, .login-btn:focus {
      background: linear-gradient(90deg, #ffcc33 0%, #ffb347 100%);
      color: #16305a;
      box-shadow: 0 4px 16px rgba(255,179,71,0.25);
    }
    .login-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      margin-right: 2px;
    }
    @media (max-width: 500px) {
      .container {
        padding: 32px 12px 24px 12px;
        max-width: 90vw;
      }
      .container img {
        width: 80px;
        height: 80px;
      }
      h1 {
        font-size: 1.4rem;
      }
      .topbar {
        padding: 16px 8vw 0 0;
      }
      .login-btn {
        font-size: 0.95rem;
        padding: 8px 14px 8px 12px;
      }
      .login-btn svg {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="https://admin.novabonus.kz" class="login-btn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.1 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      Войти
    </a>
  </div>
  <div class="container">
    <img src="images/prize.jpg" alt="Coming Soon">
    <h1>Сайт находится в разработке</h1>
    <p>Мы работаем над тем, чтобы вы могли получить доступ к нашему контенту. Оставайтесь на связи!</p>
  </div>
  <div class="footer">
    Сайт будет доступен в ближайшее время. Мы готовим для вас классный контент!
  </div>
</body>
</html>
